<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Valentine's Day ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-pink: #ff6b9d;
      --deep-rose: #c44569;
      --soft-cream: #fff5f7;
      --charcoal: #2d3436;
      --shadow: rgba(196, 69, 105, 0.2);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #ff6b9d 75%, #fec194 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Floating hearts background */
    .heart-float {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: heartRise 12s ease-in infinite;
      pointer-events: none;
    }
    
    @keyframes heartRise {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
        transform: translateY(90vh) rotate(45deg) scale(1);
      }
      90% {
        opacity: 0.6;
      }
      100% {
        transform: translateY(-10vh) rotate(180deg) scale(0);
        opacity: 0;
      }
    }
    
    /* Sparkle particles */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
      animation: sparkleFloat 10s linear infinite;
      pointer-events: none;
    }
    
    @keyframes sparkleFloat {
      0% {
        transform: translateY(100vh) translateX(0) scale(0);
        opacity: 0;
      }
      10% { 
        opacity: 1;
        transform: translateY(90vh) translateX(20px) scale(1);
      }
      90% { 
        opacity: 1; 
      }
      100% {
        transform: translateY(-10vh) translateX(-20px) scale(0);
        opacity: 0;
      }
    }
    
    /* Rose petals */
    .petal {
      position: absolute;
      width: 15px;
      height: 15px;
      background: rgba(255, 182, 193, 0.7);
      border-radius: 50% 0 50% 0;
      animation: petalFall 15s ease-in infinite;
      pointer-events: none;
    }
    
    @keyframes petalFall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.8;
      }
      100% {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }
    
    .welcome-content {
      text-align: center;
      z-index: 10;
      animation: fadeInUp 1.5s ease-out;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 80px 60px;
      border-radius: 50px;
      box-shadow: 
        0 8px 32px 0 rgba(255, 107, 157, 0.37),
        0 30px 60px rgba(0, 0, 0, 0.3),
        inset 0 0 0 1px rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 90%;
      position: relative;
    }
    
    .welcome-content::before {
      content: '';
      position: absolute;
      top: -3px;
      left: -3px;
      right: -3px;
      bottom: -3px;
      background: linear-gradient(45deg, #ff6b9d, #f093fb, #667eea, #ff6b9d);
      border-radius: 50px;
      z-index: -1;
      opacity: 0.4;
      filter: blur(15px);
      animation: borderGlow 4s ease-in-out infinite;
    }
    
    @keyframes borderGlow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.02); }
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .welcome-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 900;
      background: linear-gradient(135deg, #c44569, #ff6b9d, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      line-height: 1.1;
      letter-spacing: -1px;
      text-shadow: 0 4px 15px rgba(196, 69, 105, 0.3);
      animation: titleShine 3s ease-in-out infinite;
      position: relative;
    }
    
    @keyframes titleShine {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }
    
    .welcome-content .subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(1.5rem, 4vw, 3rem);
      color: rgba(255, 255, 255, 0.95);
      font-weight: 700;
      margin-bottom: 2rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
      letter-spacing: 2px;
      animation: subtitleFloat 3s ease-in-out infinite;
    }
    
    @keyframes subtitleFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .welcome-heart {
      font-size: clamp(4rem, 10vw, 8rem);
      animation: heartbeat 1.5s ease-in-out infinite;
      display: inline-block;
      margin-top: 1rem;
      filter: drop-shadow(0 5px 15px rgba(255, 107, 157, 0.6));
      position: relative;
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      10%, 30% { transform: scale(1.2) rotate(-5deg); }
      20%, 40% { transform: scale(1) rotate(0deg); }
    }
    
    /* Decorative elements */
    .deco-heart {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.2;
      animation: decoFloat 4s ease-in-out infinite;
    }
    
    .deco-heart-1 {
      top: 30px;
      left: 30px;
    }
    
    .deco-heart-2 {
      top: 30px;
      right: 30px;
      animation-delay: 0.5s;
    }
    
    .deco-heart-3 {
      bottom: 30px;
      left: 30px;
      animation-delay: 1s;
    }
    
    .deco-heart-4 {
      bottom: 30px;
      right: 30px;
      animation-delay: 1.5s;
    }
    
    @keyframes decoFloat {
      0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
      50% { transform: translateY(-10px) rotate(10deg); opacity: 0.4; }
    }
    
    .nav-btn {
      margin-top: 50px;
      padding: 22px 55px;
      background: linear-gradient(135deg, var(--rose-pink), var(--deep-rose));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.4rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 5px 20px var(--shadow),
        0 10px 40px rgba(196, 69, 105, 0.4);
      font-family: 'Playfair Display', serif;
      z-index: 2;
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
    }
    
    .nav-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.6s;
    }
    
    .nav-btn:hover::before {
      left: 100%;
    }
    
    .nav-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 
        0 10px 35px var(--shadow),
        0 15px 60px rgba(196, 69, 105, 0.5);
    }
    
    .nav-btn:active {
      transform: translateY(-2px) scale(1.02);
    }
    
    /* Additional decorative sparkles around content */
    .content-sparkle {
      position: absolute;
      font-size: 1.5rem;
      animation: contentSparkle 2s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes contentSparkle {
      0%, 100% { 
        opacity: 0.3;
        transform: scale(1) rotate(0deg);
      }
      50% { 
        opacity: 1;
        transform: scale(1.3) rotate(180deg);
      }
    }
    
    .sparkle-1 { top: -20px; left: 10%; animation-delay: 0s; }
    .sparkle-2 { top: -20px; right: 10%; animation-delay: 0.3s; }
    .sparkle-3 { top: 50%; left: -30px; animation-delay: 0.6s; }
    .sparkle-4 { top: 50%; right: -30px; animation-delay: 0.9s; }
    .sparkle-5 { bottom: -20px; left: 15%; animation-delay: 1.2s; }
    .sparkle-6 { bottom: -20px; right: 15%; animation-delay: 1.5s; }
    
    @media (max-width: 768px) {
      .welcome-content {
        padding: 60px 40px;
      }
      
      .deco-heart {
        font-size: 1.5rem;
      }
      
      .content-sparkle {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- Background particles -->
  <script>
    // Floating hearts
    for (let i = 0; i < 15; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart-float';
      const hearts = ['💕', '💖', '💗', '💝', '💓', '❤️'];
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 12 + 's';
      heart.style.animationDuration = (Math.random() * 8 + 10) + 's';
      document.body.appendChild(heart);
    }
    
    // Sparkles
    for (let i = 0; i < 40; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 10 + 's';
      sparkle.style.animationDuration = (Math.random() * 5 + 8) + 's';
      document.body.appendChild(sparkle);
    }
    
    // Rose petals
    for (let i = 0; i < 20; i++) {
      const petal = document.createElement('div');
      petal.className = 'petal';
      petal.style.left = Math.random() * 100 + '%';
      petal.style.animationDelay = Math.random() * 15 + 's';
      petal.style.animationDuration = (Math.random() * 10 + 12) + 's';
      const hue = Math.random() * 30 + 330; // Pink to red range
      petal.style.background = `hsla(${hue}, 100%, 85%, 0.7)`;
      document.body.appendChild(petal);
    }
  </script>

  <div class="welcome-content">
    <!-- Decorative corner hearts -->
    <div class="deco-heart deco-heart-1">💕</div>
    <div class="deco-heart deco-heart-2">💖</div>
    <div class="deco-heart deco-heart-3">💗</div>
    <div class="deco-heart deco-heart-4">💝</div>
    
    <!-- Content sparkles -->
    <div class="content-sparkle sparkle-1">✨</div>
    <div class="content-sparkle sparkle-2">✨</div>
    <div class="content-sparkle sparkle-3">⭐</div>
    <div class="content-sparkle sparkle-4">⭐</div>
    <div class="content-sparkle sparkle-5">💫</div>
    <div class="content-sparkle sparkle-6">💫</div>
    
    <h1>Happy Valentine's Day</h1>
    <p class="subtitle">To My One & Only</p>
    <div class="welcome-heart">💖</div>
    <button class="nav-btn" onclick="window.location.href='page3.html'">Continue →</button>
  </div>
</body>
</html>
