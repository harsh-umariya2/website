<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Valentine's Day ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-pink: #ff6b9d;
      --deep-rose: #c44569;
      --soft-cream: #fff5f7;
      --charcoal: #2d3436;
      --shadow: rgba(196, 69, 105, 0.2);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(135deg, #ffeef8 0%, #ffe0ec 50%, #ffd4e5 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 107, 157, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(196, 69, 105, 0.1) 0%, transparent 50%);
      animation: float 20s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-30px, -30px) rotate(5deg); }
    }
    
    .welcome-content {
      text-align: center;
      z-index: 2;
      animation: fadeInUp 1.5s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .welcome-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 900;
      color: var(--deep-rose);
      margin-bottom: 1rem;
      line-height: 1.1;
      letter-spacing: -2px;
    }
    
    .welcome-content .subtitle {
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      color: var(--rose-pink);
      font-weight: 300;
      margin-bottom: 2rem;
      font-style: italic;
    }
    
    .welcome-heart {
      font-size: 6rem;
      animation: heartbeat 1.5s ease-in-out infinite;
      display: inline-block;
      margin-top: 2rem;
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      10%, 30% { transform: scale(1.1); }
      20%, 40% { transform: scale(1); }
    }
    
    .nav-btn {
      margin-top: 50px;
      padding: 18px 45px;
      background: linear-gradient(135deg, var(--rose-pink), var(--deep-rose));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px var(--shadow);
      font-family: 'Playfair Display', serif;
      z-index: 2;
    }
    
    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px var(--shadow);
    }
  </style>
</head>
<body>
  <div class="welcome-content">
    <h1>Happy Valentine's Day</h1>
    <p class="subtitle">To My One & Only</p>
    <div class="welcome-heart">💖</div>
    <button class="nav-btn" onclick="window.location.href='page3.html'">Continue →</button>
  </div>
</body>
</html>
