<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - Valentine's Day ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-pink: #ff6b9d;
      --deep-rose: #c44569;
      --soft-cream: #fff5f7;
      --gold: #d4af37;
      --charcoal: #2d3436;
      --shadow: rgba(196, 69, 105, 0.2);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #ff6b9d 75%, #fec194 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* Sparkle Effect */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      animation: sparkleFloat 8s linear infinite;
      pointer-events: none;
    }
    
    @keyframes sparkleFloat {
      0% {
        transform: translateY(100vh) scale(0);
        opacity: 0;
      }
      10% { 
        opacity: 1;
        transform: translateY(90vh) scale(1);
      }
      90% { 
        opacity: 1; 
      }
      100% {
        transform: translateY(-10vh) scale(0);
        opacity: 0;
      }
    }
    
    .rose {
      position: absolute;
      font-size: 2rem;
      opacity: 0.25;
      animation: floatRose 15s linear infinite;
      pointer-events: none;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
    }
    
    @keyframes floatRose {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.25; }
      90% { opacity: 0.25; }
      100% {
        transform: translateY(-100px) rotate(360deg);
        opacity: 0;
      }
    }
    
    /* Heart particles */
    .heart-particle {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0;
      animation: heartFloat 10s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes heartFloat {
      0% {
        transform: translateY(100vh) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.4; }
      50% { 
        opacity: 0.6;
        transform: translateY(50vh) translateX(30px) rotate(180deg);
      }
      90% { opacity: 0.4; }
      100% {
        transform: translateY(-10vh) translateX(-30px) rotate(360deg);
        opacity: 0;
      }
    }
    
    .login-container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 60px 50px;
      border-radius: 40px;
      box-shadow: 
        0 8px 32px 0 rgba(255, 107, 157, 0.37),
        0 30px 60px rgba(0, 0, 0, 0.3),
        inset 0 0 0 1px rgba(255, 255, 255, 0.3);
      max-width: 480px;
      width: 90%;
      text-align: center;
      animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 10;
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .login-container::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #ff6b9d, #f093fb, #667eea, #ff6b9d);
      border-radius: 40px;
      z-index: -1;
      opacity: 0.3;
      filter: blur(10px);
      animation: borderGlow 3s ease-in-out infinite;
    }
    
    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    
    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
    
    .login-heart {
      font-size: 5rem;
      margin-bottom: 20px;
      animation: heartbeat 1.5s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(255, 107, 157, 0.5));
      display: inline-block;
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      10%, 30% { transform: scale(1.15); }
      20%, 40% { transform: scale(1); }
    }
    
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      background: linear-gradient(135deg, #c44569, #ff6b9d, #f093fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      font-weight: 900;
      text-shadow: 0 2px 10px rgba(196, 69, 105, 0.3);
      letter-spacing: 2px;
    }
    
    .login-subtitle {
      font-family: 'Dancing Script', cursive;
      font-size: 1.5rem;
      color: rgba(255, 255, 255, 0.95);
      margin-bottom: 40px;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      letter-spacing: 1px;
    }
    
    .input-wrapper {
      position: relative;
      margin-bottom: 25px;
    }
    
    .input-icon {
      position: absolute;
      left: 25px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.3rem;
      opacity: 0.6;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    
    .login-input {
      width: 100%;
      padding: 20px 25px 20px 55px;
      font-size: 1.1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      font-family: 'Cormorant Garamond', serif;
      transition: all 0.3s ease;
      text-align: left;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      color: #2d3436;
    }
    
    .login-input::placeholder {
      color: rgba(45, 52, 54, 0.5);
    }
    
    .login-input:focus {
      outline: none;
      border-color: var(--rose-pink);
      box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.2);
      background: rgba(255, 255, 255, 1);
      transform: translateY(-2px);
    }
    
    .login-input:focus + .input-icon {
      opacity: 1;
      transform: translateY(-50%) scale(1.1);
    }
    
    .login-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, var(--rose-pink), var(--deep-rose));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 5px 20px var(--shadow),
        0 10px 40px rgba(196, 69, 105, 0.3);
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }
    
    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }
    
    .login-btn:hover::before {
      left: 100%;
    }
    
    .login-btn:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 
        0 8px 30px var(--shadow),
        0 15px 50px rgba(196, 69, 105, 0.4);
    }
    
    .login-btn:active {
      transform: translateY(-2px) scale(0.98);
    }
    
    .error-message {
      color: #fff;
      background: rgba(231, 76, 60, 0.9);
      padding: 12px 20px;
      border-radius: 25px;
      margin-top: 20px;
      display: none;
      font-weight: 600;
      animation: shake 0.5s;
      box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    
    .decorative-corner {
      position: absolute;
      font-size: 3rem;
      opacity: 0.15;
      pointer-events: none;
    }
    
    .corner-tl {
      top: 20px;
      left: 20px;
      animation: pulse 3s ease-in-out infinite;
    }
    
    .corner-tr {
      top: 20px;
      right: 20px;
      animation: pulse 3s ease-in-out infinite 0.5s;
    }
    
    .corner-bl {
      bottom: 20px;
      left: 20px;
      animation: pulse 3s ease-in-out infinite 1s;
    }
    
    .corner-br {
      bottom: 20px;
      right: 20px;
      animation: pulse 3s ease-in-out infinite 1.5s;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.1); }
    }
  </style>
</head>
<body>
  <!-- Floating Roses -->
  <script>
    // Roses
    for (let i = 0; i < 15; i++) {
      const rose = document.createElement('div');
      rose.className = 'rose';
      rose.textContent = '🌹';
      rose.style.left = Math.random() * 100 + '%';
      rose.style.animationDelay = Math.random() * 15 + 's';
      rose.style.animationDuration = (Math.random() * 10 + 15) + 's';
      document.body.appendChild(rose);
    }
    
    // Heart particles
    for (let i = 0; i < 10; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart-particle';
      const hearts = ['💕', '💖', '💗', '💝', '💓'];
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 10 + 's';
      heart.style.animationDuration = (Math.random() * 5 + 8) + 's';
      document.body.appendChild(heart);
    }
    
    // Sparkles
    for (let i = 0; i < 30; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 8 + 's';
      sparkle.style.animationDuration = (Math.random() * 4 + 6) + 's';
      document.body.appendChild(sparkle);
    }
  </script>

  <div class="login-container">
    <div class="decorative-corner corner-tl">✨</div>
    <div class="decorative-corner corner-tr">✨</div>
    <div class="decorative-corner corner-bl">🌸</div>
    <div class="decorative-corner corner-br">🌸</div>
    
    <div class="login-heart">💝</div>
    <h1 class="login-title">Welcome</h1>
    <p class="login-subtitle">Enter the secret password</p>
    
    <div class="input-wrapper">
      <input 
        type="password" 
        class="login-input" 
        id="passwordInput" 
        placeholder="Password"
        onkeypress="if(event.key === 'Enter') checkPassword()"
      />
      <div class="input-icon">🔐</div>
    </div>
    
    <button class="login-btn" onclick="checkPassword()">Enter ❤️</button>
    <p class="error-message" id="errorMessage">Wrong password! Try again 💔</p>
  </div>

  <script>
    const correctPassword = "iloveyou"; // Change this to your desired password
    
    function checkPassword() {
      const input = document.getElementById('passwordInput');
      const errorMsg = document.getElementById('errorMessage');
      
      if (input.value.toLowerCase() === correctPassword) {
        // Redirect to page 2
        window.location.href = "page2.html";
      } else {
        errorMsg.style.display = 'block';
        input.value = '';
        input.focus();
        
        // Hide error after 3 seconds
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 3000);
      }
    }
    
    // Focus input on load
    window.onload = () => {
      document.getElementById('passwordInput').focus();
    };
  </script>
</body>
</html>
