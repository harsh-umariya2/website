<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-pink: #ff6b9d;
      --deep-rose: #c44569;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cormorant Garamond', serif;
      background: linear-gradient(135deg, #c44569 0%, #ff6b9d 100%);
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      top: -100px;
      right: -100px;
      animation: float 8s ease-in-out infinite;
    }
    
    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      bottom: -150px;
      left: -150px;
      animation: float 10s ease-in-out infinite reverse;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-30px, -30px) rotate(5deg); }
    }
    
    .final-message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900;
      margin-bottom: 30px;
      z-index: 2;
      line-height: 1.2;
      animation: fadeInUp 1s ease-out;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .final-hearts {
      font-size: 4rem;
      margin: 30px 0;
      z-index: 2;
      animation: fadeIn 1.2s ease-out 0.3s both;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .final-subtitle {
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 300;
      max-width: 600px;
      z-index: 2;
      line-height: 1.8;
      animation: fadeInUp 1.4s ease-out 0.6s both;
    }
    
    .nav-btn {
      margin-top: 50px;
      padding: 15px 35px;
      background: white;
      color: var(--deep-rose);
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      font-family: 'Cormorant Garamond', serif;
      z-index: 2;
      animation: fadeInUp 1.6s ease-out 0.9s both;
    }
    
    .nav-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }
    
    /* Confetti Animation */
    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confettiFall 4s linear infinite;
    }
    
    @keyframes confettiFall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="final-message">
    I Love You More<br/>Than Words Can Say
  </div>
  <div class="final-hearts">💖 💕 💗 💓 💝</div>
  <div class="final-subtitle">
    Here's to us, to our love, and to all the beautiful moments yet to come.
    Happy Valentine's Day, my everything.
  </div>
  <button class="nav-btn" onclick="window.location.href='page1.html'">Start Again ↻</button>

  <script>
    // Create confetti effect
    const colors = ['#ff6b9d', '#c44569', '#ff8fab', '#ffb3c1', '#ffd4e5'];
    
    function createConfetti() {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDuration = (Math.random() * 3 + 3) + 's';
      confetti.style.animationDelay = Math.random() * 2 + 's';
      document.body.appendChild(confetti);
      
      setTimeout(() => confetti.remove(), 6000);
    }
    
    // Create initial confetti
    for (let i = 0; i < 50; i++) {
      setTimeout(() => createConfetti(), i * 100);
    }
    
    // Continue creating confetti
    setInterval(() => {
      for (let i = 0; i < 5; i++) {
        createConfetti();
      }
    }, 2000);
  </script>
</body>
</html>
