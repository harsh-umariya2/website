<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Memory ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose-pink: #ff6b9d;
      --deep-rose: #c44569;
      --soft-cream: #fff5f7;
      --charcoal: #2d3436;
      --shadow: rgba(196, 69, 105, 0.2);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Cormorant Garamond', serif;
      background: #000;
      color: white;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }
    
    /* Full-screen photo container */
    .photo-container {
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    /* The main photo */
    .main-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      animation: photoZoom 20s ease-in-out infinite alternate;
    }
    
    @keyframes photoZoom {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }
    
    /* Romantic overlay gradient */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 30% 40%, rgba(255, 107, 157, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(196, 69, 105, 0.2) 0%, transparent 50%),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
      z-index: 1;
    }
    
    /* Floating hearts animation */
    .heart-float {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: heartRise 15s ease-in infinite;
      pointer-events: none;
      z-index: 2;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }
    
    @keyframes heartRise {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
        transform: translateY(90vh) rotate(45deg) scale(1);
      }
      90% {
        opacity: 0.7;
      }
      100% {
        transform: translateY(-10vh) rotate(180deg) scale(0);
        opacity: 0;
      }
    }
    
    /* Sparkle effect */
    .sparkle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      animation: sparkleFloat 12s linear infinite;
      pointer-events: none;
      z-index: 2;
    }
    
    @keyframes sparkleFloat {
      0% {
        transform: translateY(100vh) translateX(0) scale(0);
        opacity: 0;
      }
      10% { 
        opacity: 1;
        transform: translateY(90vh) translateX(20px) scale(1);
      }
      90% { 
        opacity: 1; 
      }
      100% {
        transform: translateY(-10vh) translateX(-20px) scale(0);
        opacity: 0;
      }
    }
    
    /* Text overlay */
    .text-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 3;
      animation: textFadeIn 2s ease-out;
      pointer-events: none;
    }
    
    @keyframes textFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -40%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }
    
    .romantic-title {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.5rem, 6vw, 5rem);
      color: white;
      margin-bottom: 20px;
      text-shadow: 
        0 2px 10px rgba(0, 0, 0, 0.5),
        0 0 30px rgba(255, 107, 157, 0.6);
      font-weight: 700;
      animation: titleGlow 3s ease-in-out infinite;
      line-height: 1.2;
    }
    
    @keyframes titleGlow {
      0%, 100% { 
        text-shadow: 
          0 2px 10px rgba(0, 0, 0, 0.5),
          0 0 30px rgba(255, 107, 157, 0.6);
      }
      50% { 
        text-shadow: 
          0 2px 10px rgba(0, 0, 0, 0.5),
          0 0 50px rgba(255, 107, 157, 0.9),
          0 0 70px rgba(255, 107, 157, 0.5);
      }
    }
    
    .romantic-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 3vw, 2rem);
      color: rgba(255, 255, 255, 0.95);
      font-style: italic;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      animation: subtitleFloat 4s ease-in-out infinite;
    }
    
    @keyframes subtitleFloat {
      0%, 100% { transform: translateY(0); opacity: 0.95; }
      50% { transform: translateY(-10px); opacity: 1; }
    }
    
    /* Heart icon */
    .center-heart {
      position: absolute;
      bottom: 25%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(3rem, 8vw, 6rem);
      animation: heartbeat 2s ease-in-out infinite;
      z-index: 3;
      filter: drop-shadow(0 4px 12px rgba(255, 107, 157, 0.8));
    }
    
    @keyframes heartbeat {
      0%, 100% { transform: translateX(-50%) scale(1); }
      10%, 30% { transform: translateX(-50%) scale(1.2); }
      20%, 40% { transform: translateX(-50%) scale(1); }
    }
    
    /* Navigation buttons */
    .nav-buttons {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 1000;
    }
    
    .nav-btn {
      padding: 18px 40px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 
        0 5px 20px rgba(0, 0, 0, 0.3),
        inset 0 0 0 1px rgba(255, 255, 255, 0.1);
      font-family: 'Playfair Display', serif;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }
    
    .nav-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }
    
    .nav-btn:hover::before {
      left: 100%;
    }
    
    .nav-btn:hover {
      transform: translateY(-3px);
      background: rgba(255, 107, 157, 0.3);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 
        0 8px 30px rgba(255, 107, 157, 0.4),
        inset 0 0 0 1px rgba(255, 255, 255, 0.2);
    }
    
    .nav-btn:active {
      transform: translateY(-1px);
    }
    
    /* Vignette effect */
    .vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.4);
      pointer-events: none;
      z-index: 2;
    }
    
    @media (max-width: 768px) {
      .nav-buttons {
        bottom: 20px;
        gap: 15px;
      }
      
      .nav-btn {
        padding: 15px 30px;
        font-size: 1rem;
      }
      
      .text-overlay {
        width: 90%;
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>
  <!-- Background particles -->
  <script>
    // Floating hearts
    for (let i = 0; i < 12; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart-float';
      const hearts = ['💕', '💖', '💗', '💝', '💓', '❤️', '💞'];
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = Math.random() * 100 + '%';
      heart.style.animationDelay = Math.random() * 15 + 's';
      heart.style.animationDuration = (Math.random() * 10 + 12) + 's';
      document.body.appendChild(heart);
    }
    
    // Sparkles
    for (let i = 0; i < 50; i++) {
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 12 + 's';
      sparkle.style.animationDuration = (Math.random() * 6 + 10) + 's';
      document.body.appendChild(sparkle);
    }
  </script>

  <div class="photo-container">
    <!-- Main photo - replace "img1.JPG" with your photo -->
    <img src="img1.JPG" alt="Our Memory" class="main-photo">
    
    <!-- Overlays -->
    <div class="overlay"></div>
    <div class="vignette"></div>
    
    <!-- Text overlay -->
    <div class="text-overlay">
      <h1 class="romantic-title">Falling in Love<br>Again & Again</h1>
      <p class="romantic-subtitle">Every moment with you feels like the first time</p>
    </div>
    
    <!-- Center heart -->
    <div class="center-heart">💖</div>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn" onclick="window.location.href='page2.html'">← Back</button>
    <button class="nav-btn" onclick="window.location.href='page4.html'">Next →</button>
  </div>
</body>
</html>
